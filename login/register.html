<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <!-- ============================================================
       ROSE & STEM — Register Page
       Viewport-locked · No navbar/footer · Logo links to home
       ============================================================ -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your Rose & Stem account — save special dates, manage subscriptions and track your flower deliveries." />
  <title>Create Account — Rose & Stem</title>
  <link rel="icon" href="../global-images/favicon.svg" type="image/x-icon" />

  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="login.css" />
  <link rel="stylesheet" href="register.css" />
</head>

<body class="register-page">
  
  <a href="#register-form" class="skip-link">Skip to sign-up form</a>

  
  <div class="corner-controls" aria-label="Page controls">
    <button class="ctrl-btn theme-toggle-btn" id="themeToggle" aria-label="Toggle dark/light mode" title="Toggle theme">
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg>
    </button>
<button class="ctrl-btn rtl-toggle rtl-toggle-btn" id="rtlToggle" aria-label="Toggle RTL">
  <span class="rtl-text">RTL</span>
</button>
  </div>

  <!-- ============================================================
       PAGE WRAPPER
       Register has the form panel on the LEFT and decoration on the RIGHT
       so it feels fresh and different from the login layout.
       ============================================================ -->
  <div class="auth-page auth-page-register">

    
    <div class="auth-panel-right auth-panel-form">
      <div class="auth-card auth-card-register" role="main">

        
        <a href="../home-1/home.html" class="auth-logo" aria-label="Rose and Stem — Go to homepage">
          <img src="../global-images/logo.svg" alt="Rose & Stem" width="auto" height="42" />
        </a>

        <div class="auth-header">
          <h1 class="auth-title">Create account</h1>
          <p class="auth-subtitle">Join Rose &amp; Stem and never miss a special moment</p>
        </div>

        
        <div class="social-auth social-auth-row" aria-label="Social sign-up options">
          
          <button class="social-btn social-btn-google social-btn-half" type="button" aria-label="Sign up with Google">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span>Google</span>
          </button>
          
          <button class="social-btn social-btn-apple social-btn-half" type="button" aria-label="Sign up with Apple">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
            <span>Apple</span>
          </button>
        </div>

        
        <div class="auth-divider" aria-hidden="true">
          <span>or register with email</span>
        </div>

        
        <form id="register-form" class="auth-form" novalidate aria-label="Email registration form">

          
          <div class="field-row-2">
            <div class="field-group">
              <label class="field-label" for="reg-fname">First Name</label>
              <div class="field-wrap">
                <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="8" r="5"/><path d="M3 21v-2a7 7 0 0 1 14 0v2"/></svg>
                <input
                  type="text"
                  id="reg-fname"
                  name="firstName"
                  class="field-input"
                  placeholder="Priya"
                  required
                  minlength="2"
                  autocomplete="given-name"
                  aria-required="true"
                  aria-describedby="fname-err"
                />
              </div>
              <span class="field-error" id="fname-err" role="alert"></span>
            </div>
            <div class="field-group">
              <label class="field-label" for="reg-lname">Last Name</label>
              <div class="field-wrap">
                <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="8" r="5"/><path d="M3 21v-2a7 7 0 0 1 14 0v2"/></svg>
                <input
                  type="text"
                  id="reg-lname"
                  name="lastName"
                  class="field-input"
                  placeholder="Sharma"
                  required
                  minlength="2"
                  autocomplete="family-name"
                  aria-required="true"
                  aria-describedby="lname-err"
                />
              </div>
              <span class="field-error" id="lname-err" role="alert"></span>
            </div>
          </div>

          
          <div class="field-group">
            <label class="field-label" for="reg-email">Email Address</label>
            <div class="field-wrap">
              <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              <input
                type="email"
                id="reg-email"
                name="email"
                class="field-input"
                placeholder="priya@example.com"
                required
                autocomplete="email"
                aria-required="true"
                aria-describedby="reg-email-err"
              />
            </div>
            <span class="field-error" id="reg-email-err" role="alert"></span>
          </div>

          
          <div class="field-group">
            <label class="field-label" for="reg-password">Password</label>
            <div class="field-wrap">
              <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input
                type="password"
                id="reg-password"
                name="password"
                class="field-input"
                placeholder="Min 8 characters"
                required
                minlength="8"
                autocomplete="new-password"
                aria-required="true"
                aria-describedby="reg-pw-err"
                id="reg-password"
              />
              <button type="button" class="pw-toggle" aria-label="Show password" id="toggleRegPw">
                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="display:none"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
              </button>
            </div>
            
            <div class="pw-strength" id="pw-strength" aria-label="Password strength indicator" aria-live="polite">
              <div class="pw-strength-bar" id="pw-strength-bar"></div>
            </div>
            <span class="pw-strength-label" id="pw-strength-label" aria-live="polite"></span>
            <span class="field-error" id="reg-pw-err" role="alert"></span>
          </div>

          
          <div class="field-group">
            <label class="check-label" for="reg-terms">
              <input type="checkbox" id="reg-terms" name="terms" required aria-required="true" />
              <span class="check-custom" aria-hidden="true"></span>
              I agree to the <a href="#" class="inline-link">Terms of Service</a> and <a href="#" class="inline-link">Privacy Policy</a>
            </label>
            <span class="field-error" id="terms-err" role="alert"></span>
          </div>

          
          <button type="submit" class="auth-submit" aria-label="Create your Rose and Stem account">
            Create Account
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </button>

        </form>

        
        <p class="auth-switch">
          Already have an account?
          <a href="login.html" class="auth-switch-link" aria-label="Sign in to existing account">Sign in</a>
        </p>

      </div>
    </div>

    
    <div class="auth-panel-left auth-panel-deco">
      
      <div class="blob blob-1 blob-green"></div>
      <div class="blob blob-2 blob-green"></div>
      <div class="blob blob-3"></div>

      <div class="panel-tagline">
        <span class="tagline-script">New Beginnings</span>
        <p>Save special dates. Never miss a moment.</p>
      </div>
    </div>

  </div>

  <script src="login.js"></script>
</body>
</html>
